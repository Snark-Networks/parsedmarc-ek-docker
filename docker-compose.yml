version: '3.8'

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: dmarc-elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=dmarc-cluster
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: dmarc-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
      - xpack.security.enabled=true
    # Port intentionally not exposed to host — nginx proxies all external traffic.
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  setup:
    image: alpine:latest
    container_name: dmarc-setup
    volumes:
      - ./setup:/setup:ro
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_SYSTEM_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
    command: sh -c "apk add --no-cache curl && sh /setup/setup.sh"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: "no"

  parsedmarc:
    image: ghcr.io/snarkholdings/shc-dmarc-processor/parsedmarc:latest
    pull_policy: always
    container_name: dmarc-parsedmarc
    environment:
      - IMAP_HOST=${IMAP_HOST}
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASSWORD=${IMAP_PASSWORD}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    depends_on:
      setup:
        condition: service_completed_successfully
    restart: unless-stopped

  nginx:
    image: ghcr.io/snarkholdings/shc-dmarc-processor/nginx:latest
    pull_policy: always
    container_name: dmarc-nginx
    environment:
      - KIBANA_HOSTNAME=${KIBANA_HOSTNAME}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_certs:/etc/letsencrypt
    depends_on:
      kibana:
        condition: service_healthy
    restart: unless-stopped

volumes:
  elasticsearch_data:
    driver: local
  nginx_certs:
    driver: local
