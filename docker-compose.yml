version: '3.8'

services:

  fix-snapshot-permissions:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: dmarc-fix-snapshot-permissions
    user: root
    volumes:
      - elasticsearch_snapshots:/usr/share/elasticsearch/snapshots
    command: ["chown", "-R", "1000:1000", "/usr/share/elasticsearch/snapshots"]
    restart: "no"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: dmarc-elasticsearch
    depends_on:
      fix-snapshot-permissions:
        condition: service_completed_successfully
    environment:
      - node.name=elasticsearch
      - cluster.name=dmarc-cluster
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms${ES_HEAP_SIZE:-2g} -Xmx${ES_HEAP_SIZE:-2g}
      - path.repo=/usr/share/elasticsearch/snapshots
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - elasticsearch_snapshots:/usr/share/elasticsearch/snapshots
    ports:
      - "127.0.0.1:9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: dmarc-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
      - xpack.security.enabled=true
    # Port intentionally not exposed to host — nginx proxies all external traffic.
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped

  setup:
    image: ghcr.io/snark-networks/parsedmarc-ek-docker/setup:latest
    pull_policy: always
    container_name: dmarc-setup
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_SYSTEM_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
      - KIBANA_VIEWER_PASSWORD=${KIBANA_VIEWER_PASSWORD}
      - DATA_RETENTION_DAYS=${DATA_RETENTION_DAYS:-365}
      - SNAPSHOT_SCHEDULE=${SNAPSHOT_SCHEDULE:-0 0 2 * * ?}
      - SNAPSHOT_RETENTION_DAYS=${SNAPSHOT_RETENTION_DAYS:-30}
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: "no"

  geoipupdate:
    image: ghcr.io/maxmind/geoipupdate:latest
    container_name: dmarc-geoipupdate
    environment:
      - GEOIPUPDATE_ACCOUNT_ID=${MAXMIND_ACCOUNT_ID}
      - GEOIPUPDATE_LICENSE_KEY=${MAXMIND_LICENSE_KEY}
      - GEOIPUPDATE_EDITION_IDS=GeoLite2-Country
      - GEOIPUPDATE_FREQUENCY=168
    volumes:
      - geoip_data:/usr/share/GeoIP
    restart: unless-stopped

  parsedmarc:
    image: ghcr.io/snark-networks/parsedmarc-ek-docker/parsedmarc:latest
    pull_policy: always
    container_name: dmarc-parsedmarc
    labels:
      - com.centurylinklabs.watchtower.enable=true
    environment:
      - IMAP_HOST=${IMAP_HOST}
      - IMAP_USER=${IMAP_USER}
      - IMAP_PASSWORD=${IMAP_PASSWORD}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - geoip_data:/usr/share/GeoIP:ro
    depends_on:
      setup:
        condition: service_completed_successfully
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    container_name: dmarc-watchtower
    profiles:
      - watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --cleanup --interval ${WATCHTOWER_INTERVAL:-86400}
    restart: unless-stopped

  nginx:
    image: ghcr.io/snark-networks/parsedmarc-ek-docker/nginx:latest
    pull_policy: always
    container_name: dmarc-nginx
    labels:
      - com.centurylinklabs.watchtower.enable=true
    environment:
      - KIBANA_HOSTNAME=${KIBANA_HOSTNAME}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      - NGINX_LOCALHOST_ONLY=${NGINX_LOCALHOST_ONLY:-false}
    ports:
      - "${NGINX_BIND_ADDR:-0.0.0.0}:${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_BIND_ADDR:-0.0.0.0}:${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - nginx_certs:/etc/letsencrypt
    depends_on:
      kibana:
        condition: service_healthy
    restart: unless-stopped

volumes:
  elasticsearch_data:
    driver: local
  elasticsearch_snapshots:
    driver: local
  nginx_certs:
    driver: local
  geoip_data:
    driver: local
