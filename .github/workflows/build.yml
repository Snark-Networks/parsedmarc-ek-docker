name: Build and push Docker images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-parsedmarc:
    name: parsedmarc
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push parsedmarc
        uses: docker/build-push-action@v6
        with:
          context: ./parsedmarc
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/snark-networks/parsedmarc-ek-docker/parsedmarc:latest
            ghcr.io/snark-networks/parsedmarc-ek-docker/parsedmarc:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-setup:
    name: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push setup
        uses: docker/build-push-action@v6
        with:
          context: ./setup
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/snark-networks/parsedmarc-ek-docker/setup:latest
            ghcr.io/snark-networks/parsedmarc-ek-docker/setup:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-nginx:
    name: nginx
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push nginx
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/snark-networks/parsedmarc-ek-docker/nginx:latest
            ghcr.io/snark-networks/parsedmarc-ek-docker/nginx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
